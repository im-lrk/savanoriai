<style>
:root {
  --red:#C8102E; --red2:#e00035; --bg:#F3F4F7; --card:#fff; --border:rgba(20,24,40,.11);
  --text:#111827; --muted:#5A5D72; --muted2:#777B90;
  --green1:#b7e4c7; --green2:#52b788; --green3:#2d6a4f; --green4:#1b4332;
  --purple1:#cdb4db; --purple2:#9d4edd; --purple3:#5a189a;
  --bad:#ff304f; --zero:#e5e7eb; --blue:#1550A0; --q2:#fff3cd; --q3:#e7f3ff;
  --shadow:0 4px 14px rgba(17,24,39,.08);
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,sans-serif;font-size:15px;line-height:1.45}
.header{background:#fff;border-bottom:1px solid var(--border);padding:16px 22px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:30;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.brand{display:flex;gap:12px;align-items:center}
.logo{background:var(--red);color:#fff;font-weight:800;letter-spacing:.08em;padding:5px 10px;border-radius:4px;font-size:11px}
h1{font-size:20px;margin:0 0 2px;font-weight:800;letter-spacing:-.02em}
.sub{font-size:12px;color:var(--muted);font-family:Arial,sans-serif}
.cutoff{border:1px solid var(--border);padding:6px 12px;border-radius:30px;font-size:12px;color:var(--muted);background:#fff}
.tabs{background:#fff;display:flex;gap:18px;border-bottom:1px solid var(--border);padding:0 18px;position:sticky;top:62px;z-index:25;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.tab{padding:15px 28px 13px;cursor:pointer;font-weight:800;color:#606277;border-bottom:4px solid transparent;font-size:18px}
.tab .pill{background:var(--red2);color:#fff;border-radius:5px;padding:3px 7px;font-size:14px;margin-left:8px}
.tab.act{color:var(--red2);border-bottom-color:var(--red2)}
.main{padding:22px 20px 60px;max-width:1840px;margin:0 auto}
.sec-label{display:flex;align-items:center;gap:10px;color:#30374f;font-weight:900;letter-spacing:.08em;text-transform:uppercase;font-size:13px;margin:26px 0 12px}
.sec-label:after{content:"";height:1px;background:var(--border);flex:1}
.summary-card,.hm-card{background:#fff;border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow);padding:18px 20px;margin-bottom:18px}
.chart-wrap{height:330px}
.legend{display:flex;flex-wrap:wrap;gap:18px;align-items:center;margin:8px 0 14px;font-weight:700}
.leg{display:flex;gap:7px;align-items:center;color:#111827}
.ldot{width:12px;height:12px;border-radius:3px;display:inline-block}
.l-iv{background:#179b52} .l-ne{background:var(--bad)} .l-su{background:#8f50dc} .l-q2{background:#fff3cd;border:1px solid #e8c86b} .l-q3{background:#e7f3ff;border:1px solid #87b9e8}
.help{color:#202944;font-size:13px;margin-top:-5px;margin-bottom:10px}
.hm-wrap{overflow:auto;max-height:700px;border-radius:10px}
table.hm{border-collapse:separate;border-spacing:0;width:max-content;min-width:100%;font-size:12px}
.hm th{position:sticky;top:0;background:#fff;color:#4a4d61;padding:6px 5px;text-align:center;border-bottom:1px solid var(--border);z-index:4;white-space:nowrap}
.hm th.name-th{left:0;z-index:6;text-align:left;min-width:220px;padding-left:12px}
.hm th.meta-th{left:220px;z-index:6;text-align:left;min-width:130px;padding-left:8px}
.hm td{padding:3px;text-align:center;border-bottom:1px solid rgba(20,24,40,.04);background:#fff}
.hm td.name-cell{position:sticky;left:0;background:#fff;z-index:2;text-align:left;min-width:220px;font-weight:700;padding-left:12px;color:#202944}
.hm td.meta-cell{position:sticky;left:220px;background:#fff;z-index:2;text-align:left;min-width:130px;color:#606277;font-size:11px}
.hm tr:hover td{background:#f9fafb}
.hm tr:hover td.name-cell,.hm tr:hover td.meta-cell{background:#f3f4f7}
.q-band{font-weight:900;color:#30374f;font-size:12px}
.q2-band{background:#fff3cd!important;color:#8a5200!important}
.q3-band{background:#e7f3ff!important;color:#1550A0!important}
.q-start{border-left:4px solid var(--red2)!important}
.week-label{font-size:11px;font-weight:800;color:#30374f}
.hm-cell{width:52px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;margin:0 auto;font-weight:900;font-size:12px;transition:.12s;box-shadow:inset 0 -1px 0 rgba(0,0,0,.12);border:1px solid rgba(0,0,0,.04)}
.hm-cell:hover{transform:scale(1.1);box-shadow:0 4px 10px rgba(0,0,0,.2);z-index:10;position:relative}
.hm-0{background:var(--zero);color:#6b7280}
.iv1{background:var(--green1);color:#0b3d1f}
.iv2{background:var(--green2);color:#fff}
.iv3{background:var(--green3);color:#fff}
.iv4{background:var(--green4);color:#fff}
.su1{background:var(--purple1);color:#3c096c}
.su2{background:var(--purple2);color:#fff}
.su3{background:var(--purple3);color:#fff}
.ne-c{background:var(--bad);color:#fff;border:2px solid #b00020}
.mix{outline:3px solid rgba(255,48,79,.45)}
.footer-note{color:var(--muted);font-size:12px;margin-top:12px}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:0 0 16px}
.kpi{background:#fff;border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow);padding:14px 16px}
.kpi-title{font-size:13px;color:var(--muted);font-weight:700}
.kpi-val{font-size:30px;font-weight:900;margin-top:4px}
.kpi-sub{font-size:12px;color:var(--muted)}
@media(max-width:900px){
  .tabs{gap:4px;overflow-x:auto;top:61px}
  .tab{font-size:15px;padding:12px 14px}
  .kpi-row{grid-template-columns:repeat(2,1fr)}
  .chart-wrap{height:280px}
}
</style>
</head>

const ORDER = ['ALL','CS','PPB','PPP'];

function cellClass(w){
  const total = w.iv + w.ne + w.su;
  if(total===0) return 'hm-0';
  if(w.ne>0 && w.iv===0 && w.su===0) return 'ne-c';
  if(w.ne>0) return 'iv2 mix';
  if(w.iv>0){
    if(w.iv>=10) return 'iv4';
    if(w.iv>=5) return 'iv3';
    if(w.iv>=2) return 'iv2';
    return 'iv1';
  }
  if(w.su>0){
    if(w.su>=10) return 'su3';
    if(w.su>=4) return 'su2';
    return 'su1';
  }
  return 'hm-0';
}
function cellText(w){
  const total = w.iv + w.ne + w.su;
  if(total===0) return '0';
  if(w.ne>0 && (w.iv>0 || w.su>0)) return `${w.iv}/${w.ne}`;
  return total;

    <div class="sec-label">Renginiai pagal mėnesį</div>
    <div class="summary-card">
      <h2 style="margin:0 0 6px;font-size:20px">${d.label} — mėnesinis aktyvumas</h2>
      <div class="sub" style="font-size:14px;margin-bottom:12px">Stulpeliai pakeičia mėnesių korteles, kad aiškiau matytųsi tendencija.</div>
      <div class="chart-wrap"><canvas id="monthlyChart"></canvas></div>
    </div>
    ${renderHeatmap('Savaitinis vaizdas — skyriai', d.sections, 'region')}
    ${renderHeatmap('Koordinatoriai × savaitės', d.coords, 'sky')}
    <div class="footer-note">Q1 stulpelyje susumuota 2026-01-01–2026-03-31. Q2 ir Q3 rodoma savaitėmis nuo 2026-04-01 iki 2026-09-08.</div>
  `;
  drawChart(d);
}
function drawChart(d){
  if(monthlyChart) monthlyChart.destroy();
  const ctx = document.getElementById('monthlyChart');
  monthlyChart = new Chart(ctx, {
    type:'bar',
    data:{
      labels:d.monthly.map(m=>m.month),
      datasets:[
        {label:'Įvyko', data:d.monthly.map(m=>m.iv), backgroundColor:'#249c5a', borderRadius:5, stack:'s'},
        {label:'Neįvyko', data:d.monthly.map(m=>m.ne), backgroundColor:'#e00035', borderRadius:5, stack:'s'},
        {label:'Suplanuota', data:d.monthly.map(m=>m.su), backgroundColor:'#8f50dc', borderRadius:5, stack:'s'}
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{position:'top', align:'start', labels:{boxWidth:12, boxHeight:12, color:'#111827', font:{weight:'bold', size:14}}}, tooltip:{mode:'index', intersect:false} },
      scales:{
        x:{stacked:true, grid:{color:'rgba(0,0,0,.06)'}, ticks:{color:'#3c4056', font:{size:13}}},
        y:{stacked:true, beginAtZero:true, grid:{color:'rgba(0,0,0,.08)'}, ticks:{color:'#3c4056'}}
      }
    }
  });
}
renderTabs();
renderMain();
</script>
</body>
</html>
